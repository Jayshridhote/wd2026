<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.B. Jain Professional Registration</title>
    <style>
        /* Modern Color Palette */
        :root {
            --primary: #1e3a8a; /* Deep Navy */
            --secondary: #f59e0b; /* Professional Amber */
            --accent: #eff6ff; /* Light blue tint */
            --text-main: #1e293b;
            --border-ui: #cbd5e1;
            --gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px; /* Subtle dot pattern background */
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* The Professional Border Design */
        .outer-wrapper {
            background: white;
            max-width: 650px;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border-ui);
            position: relative;
        }

        /* Decorative top accent bar */
        .outer-wrapper::before {
            content: "";
            display: block;
            height: 8px;
            background: var(--gradient);
        }

        /* Marquee Styling - Modern Look */
        marquee {
            background: #fffbeb;
            color: #b45309;
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            border-bottom: 1px solid #fde68a;
            display: block;
        }

        .container { padding: 40px; }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--secondary);
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* Fieldset & Legend Styling */
        fieldset {
            border: 1px solid var(--border-ui);
            border-radius: 12px;
            margin-bottom: 25px;
            padding: 25px;
            background-color: #ffffff;
            transition: all 0.3s ease;
        }

        fieldset:hover {
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(30, 58, 138, 0.05);
        }

        legend {
            background: var(--gradient);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-box { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        input[type="text"], 
        input[type="email"], 
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Colorful Radio & Checkbox Buttons */
        .option-card {
            display: flex;
            align-items: center;
            background: var(--accent);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-card:hover {
            border-color: var(--primary);
            background: #dbeafe;
        }

        .option-card input {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            accent-color: var(--primary);
        }

        /* Submit Button */
        button {
            width: 100%;
            background: var(--gradient);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(30, 58, 138, 0.4);
        }

        @media (max-width: 480px) {
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="outer-wrapper">
    <marquee behavior="scroll" direction="left">
        🎉 Welcome to S.B. Jain Institute! Registration for Seminar '26 is officially LIVE. Last date to apply: 25th March.
    </marquee>

    <div class="container">
        <header>
            <h1>Registration Portal</h1>
            <p>S.B. Jain Institute of Technology, Management & Research</p>
        </header>

        <form action="#">
            <fieldset>
                <legend>Primary Details</legend>
                <div class="input-box">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="input-box">
                    <label for="email">Institutional Email</label>
                    <input type="email" id="email" placeholder="rollno@sbjit.edu.in" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Program Preferences</legend>
                <div class="input-box">
                    <label for="branch">Select Branch</label>
                    <select id="branch">
                        <option>Computer Science & Engineering</option>
                        <option>Information Technology</option>
                        <option>Artificial Intelligence & Data Science</option>
                        <option>Mechanical Engineering</option>
                    </select>
                </div>

                <label>Academic Year</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <label class="option-card">
                        <input type="radio" name="yr" value="1"> 1st Year
                    </label>
                    <label class="option-card">
                        <input type="radio" name="yr" value="2"> 2nd Year
                    </label>
                    <label class="option-card">
                        <input type="radio" name="yr" value="3"> 3rd Year
                    </label>
                    <label class="option-card">
                        <input type="radio" name="yr" value="4"> 4th Year
                    </label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Seminar Add-ons</legend>
                <label>Available Workshops</label>
                <label class="option-card">
                    <input type="checkbox" name="ws" value="scholar"> Scholarship Guidance
                </label>
                <label class="option-card">
                    <input type="checkbox" name="ws" value="placement"> Placement Training
                </label>
                <label class="option-card">
                    <input type="checkbox" name="ws" value="ai"> Generative AI Seminar
                </label>
            </fieldset>

            <button type="submit">Submit Registration</button>
        </form>
    </div>
</div>

</body>
</html>
