<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Visual Portfolio</h1>
        <p>Hover over the images to see the magic</p>
    </header>

    <div class="gallery-container">
        <div class="gallery-item">
            <img src="https://picsum.photos/600/800?random=1" alt="Nature">
            <div class="overlay">
                <h3>Mountain Peak</h3>
                <p>Exploration and Adventure</p>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/600/800?random=2" alt="City">
            <div class="overlay">
                <h3>Urban Lights</h3>
                <p>The city never sleeps</p>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/600/800?random=3" alt="Ocean">
            <div class="overlay">
                <h3>Deep Blue</h3>
                <p>Silent depths of the sea</p>
            </div>
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/600/800?random=4" alt="Forest">
            <div class="overlay">
                <h3>Enchanted Forest</h3>
                <p>Nature's hidden secrets</p>
            </div>
        </div>
    </div>

</body>
</html>
